<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Federico Landozzi</title>
  <meta name="description" content="Federico Landozzi — Project Manager, Digital Marketing, Data Science & Front-End Development."/>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <link rel="manifest" href="site.webmanifest"/>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)"/>

  <!-- ── ANTI-FLASH: reads localStorage or system preference before first paint ── -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#565c84",
            "primary-dim": "#4a5078",
            "inverse-primary": "#c1c6f5",
            "on-surface": "#2b3437",
            "on-surface-variant": "#586064",
            "surface-container-high": "#e3e9ec"
          },
          fontFamily: { "sans": ["Inter","sans-serif"] },
          borderRadius: { "DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    body { font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
    .btn-primary { background:linear-gradient(135deg,#565c84,#4a5078); transition:transform .2s ease,box-shadow .2s ease; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 20px 40px rgba(43,52,55,.12); }
    .nav-active-dot { opacity:1!important; }
  </style>
</head>
<body class="bg-[#f8f9fa] dark:bg-[#0f172a] text-[#2b3437] dark:text-[#e2e8f0] antialiased transition-colors duration-200">

        <a href="about_me.html" class="flex flex-col items-center text-xs font-medium text-[#586064] dark:text-slate-400 hover:text-[#050a30] dark:hover:text-[#c1c6f5] transition-colors relative group">

        </a>
        <a href="projects.html" class="flex flex-col items-center text-xs font-medium text-[#586064] dark:text-slate-400 hover:text-[#050a30] dark:hover:text-[#c1c6f5] transition-colors relative group">

        </a>
      </div>
      <div class="flex items-center gap-3">
        <!-- Dark mode toggle -->
        <button id="theme-toggle" aria-label="Toggle dark mode"
          class="w-8 h-8 flex items-center justify-center text-[#586064] dark:text-slate-400 hover:text-[#050a30] dark:hover:text-[#c1c6f5] transition-colors">

        </button>
        <button class="md:hidden text-[#586064] dark:text-slate-400">
          <span class="material-symbols-outlined">menu</span>
        </button>

    </div>
  </nav>

            <source srcset="images/avatar_dark.svg" media="(prefers-color-scheme: dark)"/>
            <img src="images/avatar.svg" alt="Federico Landozzi" class="w-full h-full object-cover"/>

      <h1 class="text-[3.5rem] leading-[1.1] font-bold tracking-tight mb-6">Federico Landozzi</h1>

      <p class="text-lg text-[#586064] dark:text-slate-400 max-w-xl mx-auto leading-relaxed mb-12">
        Project Manager Full-Time,<br/>
        Passionate About Digital Marketing,<br/>
        Data Science &amp; Machine Learning<br/>
        and Front-End Development.
      </p>

      <a href="contact_me.html" class="btn-primary inline-flex items-center justify-center px-8 py-3 rounded-md text-sm font-semibold text-white">
        Contact Me

    <!-- Daily Quote -->

    <div class="w-full bg-[#f1f4f6] dark:bg-[#162032] py-20 transition-colors duration-200">
      <div class="max-w-7xl mx-auto px-6">
        <div class="bg-white dark:bg-[#1e293b] rounded-xl p-10 max-w-3xl mx-auto text-center transition-colors duration-200"
             style="box-shadow:0 20px 40px rgba(43,52,55,.04)">

          <blockquote class="text-xl font-semibold leading-relaxed mb-4" id="quote-text"></blockquote>
          <p class="text-sm text-[#586064] dark:text-slate-400" id="quote-author"></p>

    </div>

      <div class="flex items-center gap-6">

  </footer>

  <script>
    // ── DARK MODE TOGGLE ─────────────────────────────────────────────────────
    const btn = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    function updateIcon() {
      icon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
    }
    updateIcon();
    btn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      updateIcon();
    });

    // ── DAILY QUOTE POOL ─────────────────────────────────────────────────────
    // Edit this array to add/remove quotes. Format: { text, author }
    const quotes = [
      { text: "Done is better than perfect.", author: "Sheryl Sandberg" },
      { text: "First, solve the problem. Then, write the code.", author: "John Johnson" },
      { text: "Simplicity is the soul of efficiency.", author: "Austin Freeman" },
      { text: "Good code is its own best documentation.", author: "Steve McConnell" },
      { text: "Data is the new oil.", author: "Clive Humby" },
      { text: "The best way to predict the future is to invent it.", author: "Alan Kay" },
      { text: "The function of good software is to make the complex appear to be simple.", author: "Grady Booch" },
      { text: "Every great design begins with an even better story.", author: "Lorinda Mamo" },
      { text: "A project is complete when it starts working for you, rather than you working for it.", author: "Scott Allen" },
      { text: "The most powerful tool we have as developers is automation.", author: "Scott Hanselman" },
      { text: "Make it work, make it right, make it fast.", author: "Kent Beck" },
      { text: "Design is not just what it looks like. Design is how it works.", author: "Steve Jobs" },
    ];
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quote-text').textContent = `"${q.text}"`;
    document.getElementById('quote-author').textContent = `— ${q.author}`;
  </script>
